<script>
  function getCurrentPage() {
    return window.location.pathname.split("/").pop().toLowerCase();
  }

  function updateActiveLinks() {
    const currentPath = window.location.pathname.split("/").pop().toLowerCase() || "index.html";
    const currentSheet = new URLSearchParams(window.location.search).get("sheetName") || new URLSearchParams(window.location.search).get("sheet") || "";

    document.querySelectorAll(".app-sidebar-nav .app-nav-item").forEach((link) => {
      const href = link.getAttribute("href") || "";
      const [hrefPath, hrefSearch] = href.split("?");
      const linkPage = (hrefPath.split("/").pop() || "index.html").toLowerCase();
      const linkSheet = hrefSearch ? (new URLSearchParams(hrefSearch).get("sheetName") || new URLSearchParams(hrefSearch).get("sheet")) : "";

      let isActive = false;
      if (linkPage === currentPath) {
        if (linkPage === "list-eupd.html" || linkPage === "form-eupd.html") {
          isActive = (linkSheet === currentSheet);
        } else {
          isActive = true;
        }
      }
      link.classList.toggle("app-nav-item-active", isActive);
    });
  }

  const GAS_URL = window.GAS_URL || "https://script.google.com/macros/s/AKfycbwf5oEpUkMp65-aTQ77PIj6CEhQV64yXjBqJMiBrkacXed5AbRYimF_Cb9qTa5mczLa/exec";

  function setMenuUsername() {
    const username = localStorage.getItem("wax_logged_user") || "Pengguna";
    const usernameEl = document.getElementById("menu-username");
    if (usernameEl) {
      usernameEl.innerText = username;
    }
  }

  function filterMenuByAccess() {
    const user = localStorage.getItem("wax_logged_user");
    if (!user) return;
    
    // Hide all sheet links initially
    const sheetLinks = document.querySelectorAll(".app-sidebar-nav .app-nav-item[href*='sheetName=']");
    sheetLinks.forEach(link => {
      link.style.display = "none";
    });

    function applyAccess(data) {
      const accessList = data.map(item => String(item["Hak Akses Menu"] || item["hak akses menu"]).trim());
      sheetLinks.forEach(link => {
        const hrefSearch = link.getAttribute("href").split("?")[1] || "";
        const linkSheet = new URLSearchParams(hrefSearch).get("sheetName") || "";
        if (accessList.includes(linkSheet)) {
          link.style.display = ""; // Show if they have access
        }
      });
    }

    const storedAccess = localStorage.getItem("wax_menu_access_data");
    if (storedAccess) {
      try {
        applyAccess(JSON.parse(storedAccess));
      } catch (err) {
        console.error("Gagal parse akses menu:", err);
      }
    } else {
      // Fallback jika tidak ada di localStorage (misal sesi lama)
      fetch(`${GAS_URL}?action=getMenuAccess&username=${encodeURIComponent(user)}`)
        .then(res => res.json())
        .then(json => {
          if (json.status === "success" && Array.isArray(json.data)) {
            localStorage.setItem("wax_menu_access_data", JSON.stringify(json.data));
            applyAccess(json.data);
          }
        })
        .catch(err => console.error("Gagal memuat akses menu:", err));
    }
  }

  (function() {
    setMenuUsername();
    updateActiveLinks();
    filterMenuByAccess();
  })();
</script>
