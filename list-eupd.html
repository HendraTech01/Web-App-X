<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daftar EUPD - Web App X</title>
  <link rel="stylesheet" href="style.css">
  <script src="app.js"></script>
  <style>
    body { padding: 0 !important; align-items: stretch !important; justify-content: flex-start !important; background-color: #F8FAFC !important; }
    .app-layout-wrapper { display: flex; width: 100%; min-height: 100vh; }
    .app-sidebar-container { width: 240px; background-color: var(--color-surface); border-right: 1px solid var(--color-border); display: flex; flex-direction: column; flex-shrink: 0; }
    .app-main-content { flex-grow: 1; display: flex; flex-direction: column; min-width: 0; }
    .app-mobile-header { background-color: var(--color-surface); border-bottom: 1px solid var(--color-border); padding: 0.75rem 1rem; display: flex; align-items: center; justify-content: space-between; gap: 1rem; }
    .app-mobile-header .app-title { flex: 1; margin: 0; }
    .app-hamburger-btn { background: none; border: none; cursor: pointer; color: var(--color-text-primary); padding: 0.25rem; order: -1; }
    .app-content-body { padding: 1.5rem; overflow-y: auto; flex-grow: 1; }
    
    /* Header & Tombol Aksi */
    .page-header-bar { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 1rem; margin-bottom: 1.5rem; }
    .btn-create-new { width: auto; margin-top: 0; padding: 0.65rem 1.25rem; background-color: var(--color-primary); color: white; text-decoration: none; border-radius: var(--radius-sm); font-weight: 600; font-size: var(--font-base); display: inline-flex; align-items: center; gap: 0.5rem; box-shadow: 0 4px 10px rgba(56, 130, 246, 0.2); transition: all 0.2s; }
    .btn-create-new:hover { background-color: var(--color-primary-hover); transform: translateY(-1px); }
    
    /* Tabel / Daftar Card */
    .table-container { background: white; border-radius: var(--radius-md); border: 1px solid var(--color-border); overflow-x: auto; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.03); }
    .eupd-table { width: 100%; border-collapse: collapse; text-align: left; font-size: var(--font-base); }
    .eupd-table th { background-color: var(--color-background); padding: 0.85rem 1rem; font-weight: 600; color: var(--color-text-primary); border-bottom: 1px solid var(--color-border); white-space: nowrap; }
    .eupd-table td { padding: 0.85rem 1rem; border-bottom: 1px solid var(--color-border); color: var(--color-text-primary); white-space: nowrap; }
    .eupd-table tr:last-child td { border-bottom: none; }
    .eupd-table tr:hover td { background-color: #F8FAFC; }
    .badge-no { font-weight: 700; color: var(--color-primary); }
    
    @media (max-width: 768px) {
      .app-sidebar-container { display: none; }
      body.menu-mode-active .app-sidebar-container { display: flex !important; width: 100vw !important; height: 100vh !important; position: fixed; top: 0; left: 0; z-index: 9999; }
      body.menu-mode-active .app-main-content { display: none !important; }
      body.menu-mode-active .app-menu-close-btn { display: flex; position: absolute; right: 1rem; top: 1.5rem; background: none; border: none; color: var(--color-text-secondary); cursor: pointer; }
      .page-header-bar { flex-direction: column; align-items: stretch; }
      .btn-create-new { justify-content: center; width: 100%; }
    }
  </style>
</head>
<body>
  <script>if (!localStorage.getItem("wax_logged_user")) window.location.replace("login.html");</script>

  <div class="app-layout-wrapper">
    <div id="sidebar-slot" class="app-sidebar-container"></div>

    <div class="app-main-content">
      <header class="app-mobile-header">
        <div class="app-title" style="font-size: 1rem; margin: 0;">Web App X</div>
        <button type="button" class="app-hamburger-btn" onclick="toggleMobileMenu()">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
      </header>

      <main class="app-content-body">
        <div class="page-header-bar">
          <div>
            <div class="app-title" style="text-align: left; font-size: 1.4rem;" id="sheet-label">Daftar Pengajuan EUPD</div>
            <p style="font-size: var(--font-sm); color: var(--color-text-secondary); margin-top: 0.2rem;">Riwayat dokumen penugasan EUPD yang tersimpan di Google Sheets.</p>
          </div>
          <a href="form-eupd.html" id="btn-create-new" class="btn-create-new" style="display: none;">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Buat Pengajuan EUPD Baru
          </a>
        </div>

        <div id="list-alert" class="app-alert"></div>

        <div id="warehouse-selector" class="app-section-card" style="margin-bottom:1.5rem; display:none;"></div>

        <div class="table-container">
          <table class="eupd-table">
            <thead>
              <tr>
                <th>No. Pengajuan EUPD</th>
                <th>Tanggal Dokumen</th>
                <th>Pembuat</th>
                <th>Nama Tujuan</th>
                <th>Kendaraan</th>
                <th>Total Biaya</th>
                <th>Status</th>
                <th>Aksi</th>
              </tr>
            </thead>
            <tbody id="table-body">
              <tr><td colspan="8" class="text-center" style="padding: 2rem;">Memuat data dari Google Sheets...</td></tr>
            </tbody>
          </table>
        </div>
      </main>
    </div>
  </div>

  <script>
    // GANTI URL DI BAWAH INI DENGAN URL WEB APP GAS ANDA
    const GAS_URL = "https://script.google.com/macros/s/AKfycbwf5oEpUkMp65-aTQ77PIj6CEhQV64yXjBqJMiBrkacXed5AbRYimF_Cb9qTa5mczLa/exec";

    function getQuerySheetName() {
      const params = new URLSearchParams(window.location.search);
      return params.get("sheetName") || params.get("sheet") || "";
    }
    
    function getQueryReturnPage() {
      const params = new URLSearchParams(window.location.search);
      return params.get("returnPage") || getQuerySheetName();
    }

    function getCurrentUser() {
      return localStorage.getItem("wax_logged_user") || "";
    }

    async function fetchUserSheetAccess() {
      const user = getCurrentUser();
      if (!user) return [];

      const storedData = localStorage.getItem("wax_menu_access_data");
      if (storedData) {
        try {
          return JSON.parse(storedData);
        } catch(e) {
          console.error("Gagal parse cache akses", e);
        }
      }

      try {
        const res = await fetch(`${GAS_URL}?action=getMenuAccess&username=${encodeURIComponent(user)}`);
        const json = await res.json();
        if (json.status !== "success" || !Array.isArray(json.data)) return [];
        localStorage.setItem("wax_menu_access_data", JSON.stringify(json.data));
        return json.data;
      } catch (err) {
        console.error("Gagal memuat akses sheet user:", err);
        return [];
      }
    }

    async function fetchUserFeatureAccess() {
      const user = getCurrentUser();
      if (!user) return [];

      const storedData = localStorage.getItem("wax_feature_access_data");
      if (storedData) {
        try {
          return JSON.parse(storedData);
        } catch(e) {
          console.error("Gagal parse cache fitur akses", e);
        }
      }

      try {
        const res = await fetch(`${GAS_URL}?action=getData&sheet=FiturListEUPD`);
        const json = await res.json();
        if (json.status !== "success" || !Array.isArray(json.data)) return [];

        const userFeatures = json.data.filter(item => {
          const username = String(item["Username"] || item["username"] || "").trim();
          return username.toLowerCase() === user.toLowerCase();
        });

        localStorage.setItem("wax_feature_access_data", JSON.stringify(userFeatures));
        return userFeatures;
      } catch (err) {
        console.error("Gagal memuat akses fitur user:", err);
        return [];
      }
    }

    function hasFeaturePermission(featureName) {
      const featureAccess = JSON.parse(localStorage.getItem("wax_feature_access_data") || "[]");
      return featureAccess.some(item => {
        const feature = String(item["Fitur List EUPD"] || item["fitur list eupd"] || "").trim();
        return feature.toLowerCase() === featureName.toLowerCase();
      });
    }

    async function resolveSheetName() {
      const querySheet = getQuerySheetName();
      if (querySheet) return querySheet;

      const accessItems = await fetchUserSheetAccess();
      if (accessItems.length === 0) return "";
      const first = accessItems[0]["Hak Akses Menu"] || accessItems[0]["hak akses menu"] || "";
      return String(first).trim();
    }

    function getSheetLabel(sheetName, accessItem = null) {
      if (accessItem) {
        return String(accessItem["Nama Warehouse"] || accessItem["nama warehouse"] || accessItem["Warehouse"] || accessItem["warehouse"] || "").trim() || sheetName.replace(/^ListEUPD/i, "").trim() || sheetName;
      }
      if (!sheetName) return "Daftar EUPD";
      return sheetName.replace(/^ListEUPD/i, "").trim() || sheetName;
    }

    function createWarehouseCard(item) {
      const sheet = item["Hak Akses Menu"] || item["hak akses menu"] || "";
      const warehouse = item["Nama Warehouse"] || item["nama warehouse"] || item["Warehouse"] || item["warehouse"] || sheet;
      const card = document.createElement("div");
      card.style = "border:1px solid var(--color-border); border-radius:12px; padding:1rem; margin-bottom:1rem; background:#FFFFFF; box-shadow:0 4px 12px rgba(15,23,42,0.04);";
      card.innerHTML = `
        <div style="font-weight:700; margin-bottom:0.45rem;">${warehouse}</div>
        <div style="font-size:0.95rem; color:var(--color-text-secondary); margin-bottom:0.85rem;">Sheet: ${sheet}</div>
        <button type="button" class="app-btn" style="padding:0.65rem 1rem; font-size:0.95rem;" onclick="selectWarehouse('${encodeURIComponent(sheet)}')">Pilih ${warehouse}</button>
      `;
      return card;
    }

    function showWarehouseSelection(items) {
      const selector = document.getElementById("warehouse-selector");
      selector.innerHTML = "";
      selector.style.display = "block";
      document.querySelector(".table-container").style.display = "none";

      if (items.length === 0) {
        selector.innerHTML = '<div class="app-alert app-alert-error">Anda tidak memiliki akses ke list warehouse EUPD. Hubungi admin.</div>';
        return;
      }

      if (items.length === 1) {
        selectWarehouse(encodeURIComponent(items[0]["Hak Akses Menu"] || items[0]["hak akses menu"] || ""));
        return;
      }

      selector.innerHTML = '<div style="font-size:1rem; font-weight:700; margin-bottom:1rem;">Pilih warehouse terlebih dahulu untuk melihat daftar EUPD</div>';
      items.forEach(item => selector.appendChild(createWarehouseCard(item)));
    }

    function selectWarehouse(encodedSheet) {
      const sheetName = decodeURIComponent(encodedSheet);
      const newUrl = new URL(window.location.href);
      newUrl.searchParams.set("sheetName", sheetName);
      newUrl.searchParams.set("returnPage", sheetName);
      newUrl.searchParams.delete("sheet");
      window.location.href = newUrl.toString();
    }

    // Render data tabel EUPD dari array data
    function renderEUPDTable(data) {
      const tbody = document.getElementById("table-body");
      if (data.length === 0) {
        tbody.innerHTML = '<tr><td colspan="8" class="text-center" style="padding: 2rem; color: #64748B;">Belum ada data pengajuan EUPD di sheet tujuan ini.</td></tr>';
        return;
      }

      const uniqueEUPD = {};
      data.forEach(row => {
        const no = row["Nomor Pengajuan EUPD"];
        if (no && !uniqueEUPD[no]) {
          uniqueEUPD[no] = row;
        }
      });

        tbody.innerHTML = "";
      Object.values(uniqueEUPD).reverse().forEach(row => {
        let tgl = row["Tanggal Dokumen"] || "-";
        if (tgl !== "-" && String(tgl).includes("T")) tgl = String(tgl).split("T")[0];

        let total = row["Total Biaya Keseluruhan"] ? `Rp ${Number(row["Total Biaya Keseluruhan"]).toLocaleString('id-ID')}` : "-";

        const status = row["Status"] || "Draft";
        let statusBadge = "";
        if (status === "Draft") {
          statusBadge = '<span style="background: #FEF3C7; color: #92400E; padding: 0.25rem 0.75rem; border-radius: 4px; font-size: 12px; font-weight: 600;">Draft</span>';
        } else if (status === "Locked") {
          statusBadge = '<span style="background: #FEE2E2; color: #991B1B; padding: 0.25rem 0.75rem; border-radius: 4px; font-size: 12px; font-weight: 600;">Locked</span>';
        } else if (status === "Unlocked") {
          statusBadge = '<span style="background: #D1FAE5; color: #065F46; padding: 0.25rem 0.75rem; border-radius: 4px; font-size: 12px; font-weight: 600;">Unlocked</span>';
        } else {
          statusBadge = `<span style="background: #F1F5F9; color: #475569; padding: 0.25rem 0.75rem; border-radius: 4px; font-size: 12px; font-weight: 600;">${status}</span>`;
        }

        const canEdit = hasFeaturePermission("Edit");
        const canLock = hasFeaturePermission("Lock");
        const canUnlock = hasFeaturePermission("Unlock");

        let actionButtons = "";
        if (canEdit && status !== "Locked") {
          actionButtons += `<button type="button" class="app-btn" style="padding: 0.35rem 0.75rem; font-size: 12px;" onclick="handleEditEUPD('${row["Nomor Pengajuan EUPD"]}')">Edit</button>`;
        }
        if (canLock && status !== "Locked") {
          actionButtons += `<button type="button" class="app-btn" style="padding: 0.35rem 0.75rem; font-size: 12px; background: #FEE2E2; color: #991B1B;" onclick="handleLockEUPD('${row["Nomor Pengajuan EUPD"]}')">Lock</button>`;
        }
        if (canUnlock && status === "Locked") {
          actionButtons += `<button type="button" class="app-btn" style="padding: 0.35rem 0.75rem; font-size: 12px; background: #D1FAE5; color: #065F46;" onclick="handleUnlockEUPD('${row["Nomor Pengajuan EUPD"]}')">Unlock</button>`;
        }
        if (!actionButtons) {
          actionButtons = "<span style='color: #94A3B8; font-size: 12px;'>-</span>";
        }

        tbody.innerHTML += `
          <tr>
            <td class="badge-no">${row["Nomor Pengajuan EUPD"]}</td>
            <td>${tgl}</td>
            <td>${row["Pembuat Dokumen"] || "-"}</td>
            <td>${row["Nama Tujuan"] || "-"}</td>
            <td>${row["No Kendaraan"] || "-"}</td>
            <td style="font-weight: 600;">${total}</td>
            <td>${statusBadge}</td>
            <td>${actionButtons}</td>
          </tr>
        `;
      });
    }

    // Handler functions for Edit/Lock/Unlock actions
    async function handleEditEUPD(noEUPD) {
      const sheetName = getQuerySheetName();
      window.location.href = `form-eupd.html?sheetName=${encodeURIComponent(sheetName)}&returnPage=${encodeURIComponent(sheetName)}&editNo=${encodeURIComponent(noEUPD)}`;
    }

    async function handleLockEUPD(noEUPD) {
      if (!confirm("Apakah Anda yakin ingin mengunci dokumen EUPD ini? Dokumen yang terkunci tidak dapat diedit.")) return;
      await updateEUPDStatus(noEUPD, "Locked");
    }

    async function handleUnlockEUPD(noEUPD) {
      if (!confirm("Apakah Anda yakin ingin membuka kunci dokumen EUPD ini?")) return;
      await updateEUPDStatus(noEUPD, "Unlocked");
    }

    async function updateEUPDStatus(noEUPD, newStatus) {
      const sheetName = getQuerySheetName();
      try {
        const res = await fetch(GAS_URL, {
          method: "POST",
          body: JSON.stringify({
            action: "updateEUPDStatus",
            TargetSheet: sheetName,
            NoEUPD: noEUPD,
            NewStatus: newStatus
          })
        });
        const result = await res.json();
        if (result.status === "success") {
          alert(`Status berhasil diubah menjadi ${newStatus}`);
          await fetchAndRenderSheet(sheetName);
        } else {
          alert("Gagal mengubah status: " + (result.message || "Unknown error"));
        }
      } catch (err) {
        alert("Gagal terhubung ke server.");
        console.error(err);
      }
    }

    // Fetch data sheet dan render ke tabel
    async function fetchAndRenderSheet(sheetName) {
      const tbody = document.getElementById("table-body");
      try {
        const res = await fetch(`${GAS_URL}?action=getData&sheet=${encodeURIComponent(sheetName)}`);
        const result = await res.json();

        if (result.status === "success") {
          renderEUPDTable(result.data);
        } else {
          tbody.innerHTML = '<tr><td colspan="8" class="text-center" style="padding: 2rem; color: red;">' + (result.message || 'Gagal mengambil data dari server.') + '</td></tr>';
        }
      } catch (err) {
        tbody.innerHTML = '<tr><td colspan="8" class="text-center" style="padding: 2rem; color: red;">Gagal mengambil data dari server.</td></tr>';
        console.error(err);
      }
    }

    // Setup UI elements (header, button) berdasarkan sheet yang sudah ditentukan
    function setupPageForSheet(currentSheet, returnPage) {
      const headerLabel = document.getElementById("sheet-label");
      headerLabel.innerText = `Daftar EUPD: ${getSheetLabel(currentSheet)}`;

      const createButton = document.getElementById("btn-create-new");
      if (createButton) {
        const rp = returnPage || currentSheet;
        createButton.href = `form-eupd.html?sheetName=${encodeURIComponent(currentSheet)}&returnPage=${encodeURIComponent(rp)}`;
        createButton.style.display = "inline-flex";
      }

      document.getElementById("warehouse-selector").style.display = "none";
      document.querySelector(".table-container").style.display = "block";
    }

    async function loadListEUPD() {
      const tbody = document.getElementById("table-body");
      const headerLabel = document.getElementById("sheet-label");
      const sheetName = getQuerySheetName();
      const returnPage = getQueryReturnPage();

      // Load feature access permissions
      await fetchUserFeatureAccess();

      // FAST PATH: sheetName sudah tersedia dari URL (klik menu sidebar)
      // Langsung setup UI dan fetch data sheet tanpa menunggu fetchUserSheetAccess
      if (sheetName) {
        setupPageForSheet(sheetName, returnPage);
        await fetchAndRenderSheet(sheetName);
        return;
      }

      // SLOW PATH: tidak ada sheetName di URL, perlu cek hak akses user dulu
      const accessItems = await fetchUserSheetAccess();
      const currentSheet = (accessItems.length === 1 ? (accessItems[0]["Hak Akses Menu"] || accessItems[0]["hak akses menu"] || "") : "");

      if (!currentSheet) {
        headerLabel.innerText = "Pilih Warehouse EUPD";
        showWarehouseSelection(accessItems);
        return;
      }

      // User hanya punya 1 akses, langsung gunakan sheet tersebut
      const newUrl = new URL(window.location.href);
      newUrl.searchParams.set("sheetName", currentSheet);
      newUrl.searchParams.set("returnPage", currentSheet);
      newUrl.searchParams.delete("sheet");
      window.history.replaceState(null, "", newUrl.toString());

      setupPageForSheet(currentSheet, currentSheet);
      await fetchAndRenderSheet(currentSheet);
    }

    document.addEventListener("DOMContentLoaded", () => {
      loadSidebar();
      loadListEUPD();
    });
  </script>
</body>
</html>
