<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - Web App X</title>
  
  <link rel="stylesheet" href="style.css">
  <script src="app.js"></script>
</head>
<body class="dashboard-page">

  <script>
    if (!localStorage.getItem("wax_logged_user")) {
      window.location.replace("login.html");
    }
  </script>

  <div class="app-layout-wrapper">
    
    <div id="sidebar-slot" class="app-sidebar-container">
      <div class="app-sidebar-inner" style="display:flex;justify-content:center;align-items:center;height:100%;padding:1.5rem;color:var(--color-text-secondary);">
        Memuat menu...
      </div>
    </div>

    <div class="app-main-content">
      
      <header class="app-mobile-header">
        <div class="app-title app-header-title">Web App X</div>
        <button type="button" class="app-hamburger-btn" onclick="toggleMobileMenu()" title="Buka Menu">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="3" y1="12" x2="21" y2="12"></line>
            <line x1="3" y1="6" x2="21" y2="6"></line>
            <line x1="3" y1="18" x2="21" y2="18"></line>
          </svg>
        </button>
      </header>

      <main class="app-content-body">
        <div class="app-title app-page-title">Dashboard Utama</div>
        <p class="page-subtitle">
          Selamat datang kembali di pusat kendali operasional internal sistem.
        </p>

        <div class="menu-grid">
          
          <a href="list-eupd.html" class="app-card menu-choice-card">
            <div class="app-title menu-card-title">
              Form Pengajuan EUPD
            </div>
            <p class="menu-card-description">
              Akses cepat pengisian lembar penugasan, master data armada kendaraan, dan input rincian biaya langsung ke Google Sheets.
            </p>
          </a>

        </div>
      </main>

    </div>
  </div>

  <script>
    // Eksekusi pemanggilan komponen menu otomatis ketika halaman siap dibuka
    document.addEventListener("DOMContentLoaded", loadSidebar);
    loadSidebar();
  </script>
</body>
</html>
