<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Web App X</title>
  
  <link rel="stylesheet" href="style.css">

  <style>
    /* Ruang tambahan di kanan input password agar teks tidak menabrak ikon SVG */
    .app-input-password {
      padding-right: 2.75rem !important;
    }

    /* Posisi absolut untuk tombol ikon mata SVG */
    .toggle-password-btn {
      position: absolute;
      right: 0.75rem;
      bottom: 0.65rem;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--color-text-secondary);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0.2rem;
      border-radius: 4px;
      transition: color 0.2s ease, background-color 0.2s ease;
    }

    .toggle-password-btn:hover {
      color: var(--color-primary);
      background-color: var(--color-primary-light);
    }
  </style>
</head>
<body>

  <div class="app-card" id="login-section">
    <div class="app-title">Web App X</div>
    <div class="app-subtitle">Silakan masuk ke akun Anda</div>

    <div id="login-alert" class="app-alert"></div>

    <form id="login-form" onsubmit="handleLogin(event)">
      <div class="app-input-group">
        <label for="username">Username</label>
        <input 
          type="text" 
          id="username" 
          class="app-input" 
          placeholder="Masukkan username" 
          required 
          autocomplete="username">
      </div>

      <div class="app-input-group">
        <label for="password">Password</label>
        <input 
          type="password" 
          id="password" 
          class="app-input app-input-password" 
          placeholder="Masukkan password" 
          required 
          autocomplete="current-password">
        
        <button type="button" class="toggle-password-btn" onclick="togglePassword()" title="Tampilkan/Sembunyikan Password" aria-label="Toggle password visibility">
          <svg id="icon-eye-off" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
            <line x1="1" y1="1" x2="23" y2="23"></line>
          </svg>
          <svg id="icon-eye-open" style="display: none;" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
            <circle cx="12" cy="12" r="3"></circle>
          </svg>
        </button>
      </div>

      <button type="submit" id="btn-login" class="app-btn">Masuk</button>
    </form>
  </div>

  <script>
    // 1. GANTI URL DI BAWAH INI DENGAN URL WEB APP GAS ANDA (berakhiran /exec)
    const GAS_URL = "https://script.google.com/macros/s/AKfycbwf5oEpUkMp65-aTQ77PIj6CEhQV64yXjBqJMiBrkacXed5AbRYimF_Cb9qTa5mczLa/exec";

    // 2. FUNGSI TOGGLE SHOW/HIDE PASSWORD (SVG ICON)
    function togglePassword() {
      const passInput = document.getElementById("password");
      const iconOff = document.getElementById("icon-eye-off");
      const iconOpen = document.getElementById("icon-eye-open");

      if (passInput.type === "password") {
        passInput.type = "text";
        iconOff.style.display = "none";
        iconOpen.style.display = "block";
      } else {
        passInput.type = "password";
        iconOff.style.display = "block";
        iconOpen.style.display = "none";
      }
    }

    // 3. FUNGSI TAMPILKAN ALERT NOTIFIKASI
    function showAlert(message, type = "error") {
      const alertBox = document.getElementById("login-alert");
      alertBox.className = `app-alert app-alert-${type}`;
      alertBox.innerText = message;
      alertBox.style.display = "block";
    }

    // 4. PROSES VALIDASI LOGIN KE GOOGLE SHEETS
    async function handleLogin(event) {
      event.preventDefault();
      
      const btn = document.getElementById("btn-login");
      const usernameVal = document.getElementById("username").value.trim();
      const passwordVal = document.getElementById("password").value;

      // Status loading
      btn.disabled = true;
      btn.innerText = "Memverifikasi...";
      document.getElementById("login-alert").style.display = "none";

      try {
        const response = await fetch(GAS_URL, {
          method: "POST",
          body: JSON.stringify({ 
            action: "login", 
            username: usernameVal, 
            password: passwordVal 
          })
        });

        const result = await response.json();

        if (result.status === "success") {
          showAlert("Login berhasil! Mengalihkan...", "success");
          
          // Simpan sesi user di browser
          localStorage.setItem("wax_logged_user", result.user);

          // Redirect aman ke Dashboard setelah 800ms
          setTimeout(() => {
            window.location.replace("dashboard.html");
          }, 800);

        } else {
          showAlert(result.message || "Username atau Password salah!");
        }
      } catch (error) {
        console.error("Error Login:", error);
        showAlert("Gagal terhubung ke server. Pastikan URL GAS benar & koneksi aktif.");
      } finally {
        btn.disabled = false;
        btn.innerText = "Masuk";
      }
    }
  </script>
</body>
</html>
