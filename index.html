<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Memuat... - Web App X</title>
  
  <link rel="stylesheet" href="style.css">

  <style>
    .gateway-container {
      text-align: center;
      padding: 2rem;
    }
    
    .spinner {
      width: 36px;
      height: 36px;
      border: 4px solid var(--color-primary-light);
      border-top-color: var(--color-primary);
      border-radius: 50%;
      margin: 0 auto 1rem auto;
      animation: spin 0.8s linear infinite;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    .fallback-links {
      margin-top: 1.5rem;
      font-size: var(--font-sm);
      color: var(--color-text-secondary);
      display: none; /* Akan muncul otomatis jika redirect lambat/gagal */
    }
    
    .fallback-links a {
      color: var(--color-primary);
      text-decoration: none;
      font-weight: 600;
    }
    
    .fallback-links a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <div class="app-card gateway-container">
    <div class="spinner"></div>
    <div class="app-title" style="font-size: 1.1rem;">Web App X</div>
    <div class="app-subtitle" style="margin-bottom: 0;">Memeriksa sesi pengguna...</div>

    <div id="fallback" class="fallback-links">
      <p>Jika halaman tidak mengalihkan secara otomatis:</p>
      <div class="mt-2">
        <a href="login.html">Menuju Login</a> | <a href="dashboard.html">Menuju Dashboard</a>
      </div>
    </div>
  </div>

  <script>
    (function() {
      // 1. Ambil data sesi pengguna dari memori browser (localStorage)
      const loggedUser = localStorage.getItem("wax_logged_user");

      // 2. Fungsi pengalihan halaman yang aman (Anti-Loop Back Button)
      function redirectTo(targetPage) {
        // Menggunakan replace() agar halaman loading ini tidak masuk ke riwayat 'Back' browser
        window.location.replace(targetPage);
      }

      // 3. Eksekusi pengecekan alur lalu lintas
      setTimeout(() => {
        if (loggedUser && loggedUser.trim() !== "") {
          // Jika sudah login -> Lempar ke Dashboard
          redirectTo("dashboard.html");
        } else {
          // Jika belum login -> Lempar ke Halaman Login
          redirectTo("login.html");
        }
      }, 400); // Delay singkat 400ms agar transisi visual terasa halus dan alami

      // 4. Mekanisme Fail-Safe: Tampilkan link manual jika dalam 3 detik redirect gagal
      setTimeout(() => {
        const fallbackEl = document.getElementById("fallback");
        if (fallbackEl) fallbackEl.style.display = "block";
      }, 3000);
    })();
  </script>
</body>
</html>
