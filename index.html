<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Web App X</title>
  <style>
    /* =======================================================================
       MASTER STYLE: Azure Sky Cloud (Sleek UI & Anti Horizontal Scroll)
       STANDAR KELAS: .app- (Web App X Standard Naming Convention)
       ======================================================================= */

    /* 1. RESET & KUNCI UKURAN MUTLAK */
    *, *::before, *::after {
      box-sizing: border-box !important;
      margin: 0;
      padding: 0;
      min-width: 0;
    }

    :root {
      /* Palet Warna Azure Sky */
      --color-primary: #3882F6;
      --color-primary-hover: #2563EB;
      --color-primary-light: #F0F9FF;
      --color-surface: #FFFFFF;
      --color-background: #E0F2FE;
      --color-text-primary: #0F172A;
      --color-text-secondary: #64748B;
      --color-border: #E2E8F0;
      --color-danger: #EF4444;
      --color-success: #10B981;

      /* Ukuran Font Compact (Nyaman di layar HP) */
      --font-sm: 0.75rem;      /* 12px */
      --font-base: 0.875rem;   /* 14px */
      --font-lg: 1.25rem;      /* 20px */
      
      /* Padding & Radius */
      --pad-input: 0.65rem 0.85rem;
      --pad-card: 1.75rem 1.5rem;
      --radius-sm: 6px;
      --radius-md: 12px;
    }

    body {
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
      background-color: var(--color-background);
      color: var(--color-text-primary);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      overflow-x: hidden; /* Mencegah geser horizontal */
    }

    /* 2. KARTU APLIKASI (.app-card) */
    .app-card {
      background-color: var(--color-surface);
      width: 100%;
      max-width: 340px; /* Duduk manis di tengah layar HP/PC */
      padding: var(--pad-card);
      border-radius: var(--radius-md);
      box-shadow: 0 10px 25px -5px rgba(15, 23, 42, 0.08), 0 8px 10px -6px rgba(15, 23, 42, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.8);
    }

    .app-title {
      font-size: var(--font-lg);
      font-weight: 700;
      text-align: center;
      color: var(--color-text-primary);
      margin-bottom: 0.25rem;
    }

    .app-subtitle {
      font-size: var(--font-sm);
      color: var(--color-text-secondary);
      text-align: center;
      margin-bottom: 1.5rem;
    }

    /* 3. GRUP INPUT (.app-input-group) */
    .app-input-group {
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
      width: 100%;
      margin-bottom: 1rem;
      position: relative;
    }

    .app-input-group label {
      font-weight: 600;
      font-size: var(--font-sm);
      color: var(--color-text-primary);
    }

    .app-input {
      width: 100%;
      padding: var(--pad-input);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-sm);
      font-size: var(--font-base);
      background-color: var(--color-surface);
      color: var(--color-text-primary);
      transition: all 0.2s ease;
    }

    .app-input:focus {
      outline: none;
      border-color: var(--color-primary);
      box-shadow: 0 0 0 3px var(--color-primary-light);
    }

    /* Khusus input password agar memberi ruang untuk ikon SVG di kanan */
    .app-input-password {
      padding-right: 2.5rem;
    }

    /* Ikon Show/Hide Password SVG */
    .toggle-password-btn {
      position: absolute;
      right: 0.75rem;
      bottom: 0.65rem;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--color-text-secondary);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      transition: color 0.2s;
    }

    .toggle-password-btn:hover {
      color: var(--color-primary);
    }

    /* 4. TOMBOL UTAMA (.app-btn) */
    .app-btn {
      width: 100%;
      padding: 0.75rem;
      background-color: var(--color-primary);
      color: #FFFFFF;
      border: none;
      border-radius: var(--radius-sm);
      font-size: var(--font-base);
      font-weight: 600;
      cursor: pointer;
      transition: background-color 0.2s, transform 0.1s;
      margin-top: 0.5rem;
    }

    .app-btn:hover {
      background-color: var(--color-primary-hover);
    }

    .app-btn:active {
      transform: scale(0.98);
    }

    .app-btn:disabled {
      background-color: var(--color-text-secondary);
      cursor: not-allowed;
      transform: none;
    }

    /* 5. ALERT / NOTIFIKASI (.app-alert) */
    .app-alert {
      padding: 0.65rem;
      border-radius: var(--radius-sm);
      font-size: var(--font-sm);
      text-align: center;
      margin-bottom: 1rem;
      display: none;
      font-weight: 500;
    }

    .app-alert-error {
      background-color: #FEE2E2;
      color: var(--color-danger);
      border: 1px solid #FCA5A5;
    }

    .app-alert-success {
      background-color: #D1FAE5;
      color: var(--color-success);
      border: 1px solid #6EE7B7;
    }
  </style>
</head>
<body>

  <div class="app-card" id="login-section">
    <div class="app-title">Web App X</div>
    <div class="app-subtitle">Silakan masuk untuk melanjutkan</div>

    <div id="login-alert" class="app-alert"></div>

    <form id="login-form" onsubmit="handleLogin(event)">
      <div class="app-input-group">
        <label for="username">Username</label>
        <input 
          type="text" 
          id="username" 
          class="app-input" 
          placeholder="Masukkan username" 
          required 
          autocomplete="username">
      </div>

      <div class="app-input-group">
        <label for="password">Password</label>
        <input 
          type="password" 
          id="password" 
          class="app-input app-input-password" 
          placeholder="Masukkan password" 
          required 
          autocomplete="current-password">
        
        <button type="button" class="toggle-password-btn" onclick="togglePassword()" title="Tampilkan/Sembunyikan Password" aria-label="Toggle password visibility">
          <svg id="icon-eye-off" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
            <line x1="1" y1="1" x2="23" y2="23"></line>
          </svg>
          <svg id="icon-eye-open" style="display: none;" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
            <circle cx="12" cy="12" r="3"></circle>
          </svg>
        </button>
      </div>

      <button type="submit" id="btn-login" class="app-btn">Masuk</button>
    </form>
  </div>

  <script>
    // =========================================================================
    // KONFIGURASI BACKEND: Ganti dengan URL Web App Apps Script Anda!
    // =========================================================================
    const GAS_URL = "https://script.google.com/macros/s/MASUKKAN_URL_WEB_APP_ANDA_DISINI/exec";

    // 1. FUNGSI TOGGLE SHOW/HIDE PASSWORD (SVG ICON)
    function togglePassword() {
      const passInput = document.getElementById("password");
      const iconOff = document.getElementById("icon-eye-off");
      const iconOpen = document.getElementById("icon-eye-open");

      if (passInput.type === "password") {
        passInput.type = "text";
        iconOff.style.display = "none";
        iconOpen.style.display = "block";
      } else {
        passInput.type = "password";
        iconOff.style.display = "block";
        iconOpen.style.display = "none";
      }
    }

    // 2. FUNGSI TAMPILKAN ALERT
    function showAlert(message, type = "error") {
      const alertBox = document.getElementById("login-alert");
      alertBox.className = `app-alert app-alert-${type}`;
      alertBox.innerText = message;
      alertBox.style.display = "block";
    }

    // 3. FUNGSI PROSES LOGIN (ASYNC/FETCH KE GAS)
    async function handleLogin(event) {
      event.preventDefault();
      
      const btn = document.getElementById("btn-login");
      const usernameVal = document.getElementById("username").value.trim();
      const passwordVal = document.getElementById("password").value;

      // Ubah status tombol menjadi loading
      btn.disabled = true;
      btn.innerText = "Memverifikasi...";
      document.getElementById("login-alert").style.display = "none";

      try {
        const response = await fetch(GAS_URL, {
          method: "POST",
          body: JSON.stringify({ 
            action: "login", 
            username: usernameVal, 
            password: passwordVal 
          })
        });

        const result = await response.json();

        if (result.status === "success") {
          showAlert("Login berhasil! Mengalihkan...", "success");
          
          // Simpan sesi user di browser (bisa dipakai saat beralih ke dashboard)
          localStorage.setItem("wax_logged_user", result.user);

          // Simulasi transisi ke tahap berikutnya
          setTimeout(() => {
            alert(`Selamat datang, ${result.user}! (Halaman Dashboard akan dimuat di sini pada Fase 2)`);
            // Nantinya di Fase 2 kita akan menyembunyikan kartu login & menampilkan kartu dashboard
          }, 1000);

        } else {
          showAlert(result.message || "Username atau Password salah!");
        }
      } catch (error) {
        console.error("Error Login:", error);
        showAlert("Gagal terhubung ke server database. Periksa koneksi atau URL GAS Anda.");
      } finally {
        btn.disabled = false;
        btn.innerText = "Masuk";
      }
    }
  </script>
</body>
</html>
